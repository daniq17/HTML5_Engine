<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Engine - Bomberman Clone</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="css/style.css">

    <!-- Engine core -->
    <script src="src/engine/renderer.js"></script>
    <script src="src/engine/main.js"></script>
    <script src="src/engine/utils_math.js"></script>
    <script src="src/engine/input.js"></script>
    <script src="src/engine/audioplayer.js"></script>
    <script src="src/engine/game.js"></script>
    <script src="src/engine/utils_classes.js"></script>
    <script src="src/engine/gameobjects.js"></script>

    <!-- Example game -->
    <script src="src/examples/bomberman/bomberman.js"></script>

    <style>
        body { display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f3f3f3; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
        #notes { position: absolute; bottom: 10px; left: 10px; font-family: Arial, sans-serif; font-size: 13px; color:#333; }

        /* Main Menu styles */
        #mainMenu {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        #mainMenu > div {
            background: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        }

        #mainMenu h1 {
            margin: 0;
            font-size: 48px;
        }

        #mainMenu p {
            margin: 6px 0 20px;
            font-size: 20px;
            color: #666;
        }

        #mainMenu button {
            padding: 10px 24px;
            font-size: 18px;
        }

        /* Pause Overlay styles */
        #pauseOverlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        #pauseOverlay > div {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        #pauseOverlay h2 {
            margin: 0 0 10px;
        }

        #pauseOverlay label {
            display: block;
            margin-bottom: 8px;
            text-align: left;
        }

        #pauseOverlay input {
            width: 100%;
            margin-bottom: 12px;
        }

        #pauseOverlay button {
            padding: 8px 16px;
        }

        /* Game Over Overlay styles */
        #gameOverOverlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1001;
        }

        #gameOverOverlay > div {
            background: #fff;
            padding: 28px;
            border-radius: 8px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #gameOverOverlay h2 {
            margin: 0 0 10px;
            font-size: 28px;
        }

        #gameOverOverlay p {
            margin: 6px 0 18px;
            font-size: 18px;
            color: #333;
        }

        #gameOverOverlay button {
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <button id="startBtn">Start / Restart</button>
    </div>

    <canvas id="myCanvas" width="800" height="600" style="border:1px solid #888; background: #fff;" tabindex="0"></canvas>

    <div id="notes">WASD = move, Space = place bomb</div>

    <!-- Main Menu -->
    <div id="mainMenu" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.5);">
        <div style="background:#fff; padding:20px 26px; border-radius:8px; text-align:center; box-shadow:0 6px 18px rgba(0,0,0,0.3); max-width:520px;">
            <h1 style="margin:0; font-size:40px;">BomberKids</h1>
            <p style="margin:6px 0 12px; font-size:16px; color:#666;">Who Gave Them Bombs?</p>
            <div style="display:flex; gap:12px; justify-content:center; margin-bottom:12px;">
                <div style="text-align:center;">
                    <div style="font-size:12px; margin-bottom:6px;">Player 1</div>
                    <img id="p1Thumb" src="" alt="P1" style="width:48px; height:48px; cursor:pointer; border-radius:6px; border:2px solid #ccc;" title="Click to cycle colors" />
                </div>
                <div style="text-align:center;">
                    <div style="font-size:12px; margin-bottom:6px;">Player 2</div>
                    <img id="p2Thumb" src="" alt="P2" style="width:48px; height:48px; cursor:pointer; border-radius:6px; border:2px solid #ccc;" title="Click to cycle colors" />
                </div>
            </div>
            <div style="margin-bottom:12px;">
                <button id="menuPlayBtn" style="padding:10px 24px; font-size:18px;">Play</button>
            </div>
            <div style="font-size:12px; color:#888;">Choose each player's color before starting.</div>
        </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" style="position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5);">
        <div style="background:#fff; padding:24px; border-radius:8px; width:360px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,0.3);">
            <h2 style="margin:0 0 10px;">Paused</h2>
            <label style="display:block; margin-bottom:8px; text-align:left;">Volume</label>
            <input id="volumeSlider" type="range" min="0" max="100" value="100" style="width:100%; margin-bottom:12px;" />
            <div style="display:flex; gap:8px; justify-content:center;">
                <button id="resumeBtn" style="padding:8px 16px;">Resume</button>
                <button id="menuBtn" style="padding:8px 16px;">Menu</button>
            </div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOverOverlay" style="position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); z-index: 1001;">
        <div style="background:#fff; padding:28px; border-radius:8px; width:420px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
            <h2 id="gameOverTitle" style="margin:0 0 10px; font-size:28px;">Game Over</h2>
            <p id="gameOverMessage" style="margin:6px 0 18px; font-size:18px; color:#333;">Player 1 Wins</p>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button id="gameOverMenuBtn" style="padding:8px 16px;">Menu</button>
                <button id="gameOverRestartBtn" style="padding:8px 16px;">Restart</button>
            </div>
        </div>
    </div>

    <script>
        // Small SVG sprites in data-URI form (keeps repository light).
        const playerSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'>
                <rect x='6' y='8' width='28' height='24' rx='4' ry='4' fill='%23007acc' />
                <circle cx='18' cy='18' r='3' fill='%23fff' />
            </svg>`);

        const bombSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 28 28'>
                <circle cx='14' cy='14' r='10' fill='%23000' />
                <rect x='18' y='2' width='4' height='8' fill='%23b33' rx='1' ry='1' />
            </svg>`);

        const brickSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'>
                <rect x='2' y='6' width='36' height='28' fill='%238b4513' rx='3' ry='3' />
            </svg>`);

        const wallSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'>
                <rect x='2' y='6' width='36' height='28' fill='%23333' rx='2' ry='2' />
            </svg>`);

        const enemySVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 36 36'>
                <rect x='4' y='6' width='28' height='22' fill='%23c03030' rx='4' ry='4' />
                <circle cx='12' cy='14' r='2' fill='%23fff' />
            </svg>`);

        // Create Image objects for game to use if desired
        const playerImage = new Image(); playerImage.src = playerSVG;
        const bombImage = new Image(); bombImage.src = bombSVG;
        const brickImage = new Image(); brickImage.src = brickSVG;
        const wallImage = new Image(); wallImage.src = wallSVG;
        const enemyImage = new Image(); enemyImage.src = enemySVG;

        // Load player sprite sheets (multiple color choices)
        const playerColors = ['blue','brown','green','pink','purple','yellow'];
        const playerSheets = {};
        playerColors.forEach(col => {
            const img = new Image();
            img.src = `src/examples/bomberman/assets/${col}Player.png`;
            playerSheets[col] = img;
        });

        // Helper: create a thumbnail from the first 64x64 frame of a spritesheet
        function createThumbFromSheet(img, size=48) {
            if (!img) return '';
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            try {
                // draw only the first 64x64 section (top-left)
                ctx.drawImage(img, 0, 0, 64, 64, 0, 0, size, size);
                return canvas.toDataURL();
            } catch (e) {
                return '';
            }
        }

        function setThumb(imgElement, sheetImg) {
            if (!imgElement) return;
            if (sheetImg && sheetImg.complete) {
                const data = createThumbFromSheet(sheetImg, Math.max(32, Math.min(64, imgElement.width || 48)));
                if (data) imgElement.src = data;
            } else if (sheetImg) {
                sheetImg.onload = () => {
                    const data = createThumbFromSheet(sheetImg, Math.max(32, Math.min(64, imgElement.width || 48)));
                    if (data) imgElement.src = data;
                };
            }
        }

        // Create previews mapping (optional)
        const playerSpritePreview = {
            p1: playerSheets.blue,
            p2: playerSheets.purple
        };

        // bomb sprite sheet (4 frames 16x16 in a 64x16 image)
        const bombSprites = new Image(); bombSprites.src = "src/examples/bomberman/assets/bomb_sprites.png";

        // Simple synthesized sounds via WebAudio for place bomb and explosion and death
        let audioCtx = null;

        function ensureAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playPlaceBomb() {
            ensureAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(440, audioCtx.currentTime);
            // sanitize volume
            let vol = Number(window.GameVolume);
            if (!isFinite(vol) || vol <= 0) vol = 1.0;
            vol = Math.max(0.0001, vol);
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            // use finite positive target for exponential ramp
            g.gain.exponentialRampToValueAtTime(0.09 * vol, audioCtx.currentTime + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.22);
        }

        function playExplosion() {
            ensureAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(120, audioCtx.currentTime);
            // sanitize volume
            let vol = Number(window.GameVolume);
            if (!isFinite(vol) || vol <= 0) vol = 1.0;
            vol = Math.max(0.0001, vol);
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.3 * vol, audioCtx.currentTime + 0.01);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.6);
        }

        function playDeath() {
            ensureAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square';
            o.frequency.setValueAtTime(200, audioCtx.currentTime);
            // sanitize volume
            let vol = Number(window.GameVolume);
            if (!isFinite(vol) || vol <= 0) vol = 1.0;
            vol = Math.max(0.0001, vol);
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.2 * vol, audioCtx.currentTime + 0.01);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.7);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.7);
        }

        // Expose assets globally so src/examples/bomberman/bomberman.js can use them if it checks window.BombermanAssets
        window.BombermanAssets = {
            playerSheets, // map of color -> Image
            playerSpritePreview,
            playerSpriteP1: playerSheets.blue,
            playerSpriteP2: playerSheets.purple,
            playerImage, bombImage, brickImage, wallImage, enemyImage, bombSprites
        };

        // attach audio helper functions after the object exists (avoids ReferenceError if functions weren't parsed yet)
        window.BombermanAssets.playPlaceBomb = playPlaceBomb;
        window.BombermanAssets.playExplosion = playExplosion;
        window.BombermanAssets.playDeath = playDeath;

        function showMainMenu() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('pauseOverlay').style.display = 'none';
            // pause the game loop
            window.GamePaused = true;
        }

        function hideMainMenu() {
            document.getElementById('mainMenu').style.display = 'none';
            // allow the game to run
            window.GamePaused = false;
        }

        function startGameFromMenu() {
            hideMainMenu();
            // initialize the example game
            Init(BombermanGame);
        }

        function togglePause() {
            const overlay = document.getElementById('pauseOverlay');
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
                window.GamePaused = false;
            } else {
                overlay.style.display = 'flex';
                window.GamePaused = true;
            }
        }

        // when starting the game apply selected player sheets
        function ApplyPlayerSelections() {
            const p1Thumb = document.getElementById('p1Thumb');
            const p2Thumb = document.getElementById('p2Thumb');
            const p1 = (p1Thumb && p1Thumb.dataset && p1Thumb.dataset.color) ? p1Thumb.dataset.color : 'blue';
            const p2 = (p2Thumb && p2Thumb.dataset && p2Thumb.dataset.color) ? p2Thumb.dataset.color : 'purple';
            if (window.BombermanAssets && window.BombermanAssets.playerSheets) {
                window.BombermanAssets.playerSpriteP1 = window.BombermanAssets.playerSheets[p1] || window.BombermanAssets.playerSpriteP1;
                window.BombermanAssets.playerSpriteP2 = window.BombermanAssets.playerSheets[p2] || window.BombermanAssets.playerSpriteP2;
            }
        }

        // Hook into existing start handlers to apply selection before Init
        const originalMenuPlay = window.menuPlayBtnClick;

        // Start the page
        window.onload = () => {
            // setup thumbnail selectors for players
            const p1Thumb = document.getElementById('p1Thumb');
            const p2Thumb = document.getElementById('p2Thumb');
            if (p1Thumb) {
                // default to blue
                p1Thumb.dataset.colorIndex = 0;
                p1Thumb.dataset.color = playerColors[0];
                setThumb(p1Thumb, playerSheets[playerColors[0]]);
                p1Thumb.addEventListener('click', () => {
                    let idx = (parseInt(p1Thumb.dataset.colorIndex || 0, 10) + 1) % playerColors.length;
                    p1Thumb.dataset.colorIndex = idx;
                    const col = playerColors[idx];
                    p1Thumb.dataset.color = col;
                    setThumb(p1Thumb, playerSheets[col]);
                });
            }
            if (p2Thumb) {
                // default to purple
                const defaultIdx = playerColors.indexOf('purple') >= 0 ? playerColors.indexOf('purple') : 4;
                p2Thumb.dataset.colorIndex = defaultIdx;
                p2Thumb.dataset.color = playerColors[defaultIdx];
                setThumb(p2Thumb, playerSheets[playerColors[defaultIdx]]);
                p2Thumb.addEventListener('click', () => {
                    let idx = (parseInt(p2Thumb.dataset.colorIndex || 0, 10) + 1) % playerColors.length;
                    p2Thumb.dataset.colorIndex = idx;
                    const col = playerColors[idx];
                    p2Thumb.dataset.color = col;
                    setThumb(p2Thumb, playerSheets[col]);
                });
            }
            // Start button (keeps old behaviour as restart)
            document.getElementById('startBtn').addEventListener('click', () => {
                ApplyPlayerSelections();
                Init(BombermanGame);
                document.getElementById('mainMenu').style.display = 'none';
                window.GamePaused = false;
            });

            // Main menu Play button
            document.getElementById('menuPlayBtn').addEventListener('click', () => { ApplyPlayerSelections(); startGameFromMenu(); });

            // Pause overlay buttons
            document.getElementById('resumeBtn').addEventListener('click', () => togglePause());
            document.getElementById('menuBtn').addEventListener('click', () => {
                // show main menu and stop current game
                showMainMenu();
            });

            // Volume slider
            const vol = document.getElementById('volumeSlider');
            vol.addEventListener('input', (e) => {
                const v = Number(e.target.value);
                window.GameVolume = isFinite(v) ? v / 100.0 : 1.0;
            });

            // Clicking canvas focuses input
            const c = document.getElementById('myCanvas');
            c.addEventListener('mousedown', () => c.focus());

            // Show main menu on load
            showMainMenu();

            // Toggle pause with Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' || e.keyCode === 27) {
                    // only toggle if a game is initialized
                    if (typeof Init === 'function') {
                        togglePause();
                    }
                }
            });
        };

        // Show game over overlay with winner id (1 or 2)
        function ShowGameOver(winner) {
            const overlay = document.getElementById('gameOverOverlay');
            const msg = document.getElementById('gameOverMessage');
            const title = document.getElementById('gameOverTitle');
            title.textContent = 'Game Over';
            msg.textContent = winner === 1 ? 'Player 1 Wins' : 'Player 2 Wins';
            overlay.style.display = 'flex';
            // pause game loop
            window.GamePaused = true;
        }

        function HideGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            overlay.style.display = 'none';
            window.GamePaused = false;
        }

        // Hook overlay buttons
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.getElementById('gameOverMenuBtn');
            const restartBtn = document.getElementById('gameOverRestartBtn');
            if (menuBtn) menuBtn.addEventListener('click', () => {
                HideGameOver();
                // show main menu overlay
                showMainMenu();
            });
            if (restartBtn) restartBtn.addEventListener('click', () => {
                HideGameOver();
                // restart the game
                ApplyPlayerSelections();
                Init(BombermanGame);
                document.getElementById('mainMenu').style.display = 'none';
                window.GamePaused = false;
            });
        });
    </script>
</body>
</html>
