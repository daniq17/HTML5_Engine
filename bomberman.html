<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Engine - Bomberman Clone</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="css/style.css">

    <!-- Engine core -->
    <script src="src/engine/renderer.js"></script>
    <script src="src/engine/main.js"></script>
    <script src="src/engine/utils_math.js"></script>
    <script src="src/engine/input.js"></script>
    <script src="src/engine/audioplayer.js"></script>
    <script src="src/engine/game.js"></script>
    <script src="src/engine/utils_classes.js"></script>
    <script src="src/engine/gameobjects.js"></script>

    <!-- Example game -->
    <script src="src/examples/bomberman/bomberman.js"></script>

    <style>
        @font-face {
            font-family: 'pixelFont2';
            src: url('src/examples/bomberman/assets/pixelFont2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        body { margin:0; background:#f3f3f3; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-height:100vh; font-family: 'pixelFont2', monospace; }
        #gameContainer { width: 600px; }
        /* Player stats header directly above canvas, no gaps */
        #gameHeader { width: 600px; height: 80px; box-sizing:border-box; background: #e97d00; display:flex; align-items:center; justify-content:space-between; padding:8px 25px; font-family: 'pixelFont2', monospace; font-size:20px; color:#111; border-bottom: 3px solid rgb(233, 62, 0); }
        /* Render UI icons with nearest-neighbor scaling to avoid blur */
        #gameHeader img { image-rendering: pixelated; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; }
        /* disable smoothing for menu thumbnails */
        #p1Thumb, #p2Thumb { image-rendering: pixelated; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; }

        /* Ensure menu and overlay buttons use the pixel font */
        #mainMenu button, #pauseOverlay button, #gameOverOverlay button { font-family: 'pixelFont2', monospace; }

        /* Volume slider styling (uses CSS variable --range-bg for filled portion) */
        #pauseOverlay input[type=range] { -webkit-appearance:none; appearance:none; height:10px; background:var(--range-bg, #ddd); border-radius:6px; }
        #pauseOverlay input[type=range]::-webkit-slider-runnable-track { height:10px; background:var(--range-bg, #ddd); border-radius:6px; }
        #pauseOverlay input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; background: rgb(233,62,0); border-radius:50%; margin-top:-3px; box-shadow:0 0 0 3px rgba(0,0,0,0.2); }
        #pauseOverlay input[type=range]:hover::-webkit-slider-thumb { background: rgb(200,50,0); }
        #pauseOverlay input[type=range]:active::-webkit-slider-thumb { background: rgb(255,90,30); }

        /* Firefox: style the filled portion specifically */
        #pauseOverlay input[type=range]::-moz-range-track { height:10px; background:#ddd; border-radius:6px; }
        #pauseOverlay input[type=range]::-moz-range-progress { height:10px; background: rgb(233,62,0); border-radius:6px; }
        #pauseOverlay input[type=range]::-moz-range-thumb { width:16px; height:16px; background: rgb(233,62,0); border-radius:50%; border: none; }
        #pauseOverlay input[type=range]:hover::-moz-range-thumb { background: rgb(200,50,0); }
        #pauseOverlay input[type=range]:active::-moz-range-thumb { background: rgb(255,90,30); }

        /* IE / old Edge: filled part */
        #pauseOverlay input[type=range]::-ms-fill-lower { background: rgb(233,62,0); }
        #notes { font-family: 'pixelFont2', monospace; font-size: 13px; color:#333; display:none; }

        /* Main Menu styles */
        #mainMenu {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        /* Remove any accidental borders/outlines around overlays and panels */
        #mainMenu, #mainMenu > div, #mainMenuPanel, #menuAnimCanvas { border: none !important; outline: none !important; }

        #mainMenu > div {
            background: #e97d00;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        }

        #mainMenu h1 {
            margin: 0;
            font-size: 48px;
        }

        #mainMenu p {
            margin: 6px 0 20px;
            font-size: 20px;
            color: #666;
        }

        #mainMenu button {
            padding: 10px 24px;
            font-size: 18px;
        }

        /* Pause Overlay styles */
        #pauseOverlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        #pauseOverlay > div {
            background: #e97d00;
            padding: 24px;
            border-radius: 8px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        #pauseOverlay h2 {
            margin: 0 0 10px;
        }

        #pauseOverlay label {
            display: block;
            margin-bottom: 8px;
            text-align: left;
        }

        #pauseOverlay input {
            width: 100%;
            margin-bottom: 12px;
        }

        #pauseOverlay button {
            padding: 8px 16px;
        }

        /* Game Over Overlay styles */
        #gameOverOverlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1001;
        }

        #gameOverOverlay > div {
            background: #e97d00;
            padding: 28px;
            border-radius: 8px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #gameOverOverlay h2 {
            margin: 0 0 10px;
            font-size: 28px;
        }

        #gameOverOverlay p {
            margin: 6px 0 18px;
            font-size: 18px;
            color: #333;
        }

        #gameOverOverlay button {
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameHeader">
            <div id="gameState"></div>
            <div id="gamePlayers"></div>
        </div>

        <canvas id="myCanvas" width="600" height="520" style="background: #fff; display:block; margin:0; padding:0; border: none;" tabindex="0"></canvas>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.5);">
        <div id="mainMenuPanel" style="width:600px; height:600px; box-sizing:border-box; background:#e97d00; border-radius:8px; text-align:center; box-shadow:0 6px 18px rgba(65,31,0,0.678); display:flex; flex-direction:column; align-items:center; justify-content:center; transform-origin:center; position:relative; overflow:visible;">
            <!-- animation canvas overlays the panel and runs the intro sequence -->
            <canvas id="menuAnimCanvas" width="600" height="600" style="position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none; image-rendering: pixelated; background: transparent; -moz-image-rendering: pixelated; -webkit-image-rendering: pixelated;"></canvas>

            <!-- Title & subtitle: hidden initially, revealed after the intro animation -->
            <div id="menuTitles" style="position:relative; z-index:2;">
                <h1 id="menuTitle" style="margin:0; font-size:40px; opacity:0; transition:opacity 800ms ease-in;">BomberKids</h1>
                <p id="menuSubtitle" style="margin:6px 0 12px; font-size:16px; color:#000000; opacity:0; transition:opacity 800ms ease-in 400ms;">Who Gave Them Bombs?</p>
            </div>

            <!-- Main content hidden initially; slides up when shown -->
            <div id="menuContent" style="position:relative; z-index:2; transform:translateY(40px); opacity:0; transition:transform 900ms cubic-bezier(.23,1,.32,1), opacity 700ms ease-in; display:flex; flex-direction:column; align-items:center;">
                <div style="display:flex; gap:12px; justify-content:center; margin-bottom:12px;">
                    <div style="text-align:center;">
                        <div style="font-size:12px; margin-bottom:6px;">Player 1</div>
                        <img id="p1Thumb" src="" alt="P1" style="width:52px; height:52px; cursor:pointer; border-radius:6px; border:2px solid #5f2300;" title="Click to cycle colors" />
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:12px; margin-bottom:6px;">Player 2</div>
                        <img id="p2Thumb" src="" alt="P2" style="width:52px; height:52px; cursor:pointer; border-radius:6px; border:2px solid #5f2300;" title="Click to cycle colors" />
                    </div>
                </div>
                <div style="margin-bottom:12px;">
                    <button id="menuPlayBtn" style="padding:10px 24px; font-size:18px;">Play</button>
                </div>
                <div style="font-size:12px; color:#000000;">Choose each player's color before starting.</div>
            </div>
        </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" style="position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5);">
        <div style="background:#e97d00; padding:24px; border-radius:8px; width:360px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,0.3);">
            <h2 style="margin:0 0 10px;">Paused</h2>
            <label style="display:block; margin-bottom:8px; text-align:left;">Volume</label>
            <input id="volumeSlider" type="range" min="0" max="100" value="100" style="width:100%; margin-bottom:12px;" />
            <div style="display:flex; gap:8px; justify-content:center;">
                <button id="resumeBtn" style="padding:8px 16px;">Resume</button>
                <button id="menuBtn" style="padding:8px 16px;">Menu</button>
            </div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOverOverlay" style="position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); z-index: 1001;">
        <div id="gameOverPanel" style="width:600px; height:600px; box-sizing:border-box; background:#e97d00; border-radius:8px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.5); display:flex; flex-direction:column; align-items:center; justify-content:center; transform-origin:center;">
            <h2 id="gameOverTitle" style="margin:0 0 10px; font-size:28px;">Game Over</h2>
            <p id="gameOverMessage" style="margin:6px 0 18px; font-size:18px; color:#333;">Player 1 Wins</p>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button id="gameOverMenuBtn" style="padding:8px 16px;">Menu</button>
                <button id="gameOverRestartBtn" style="padding:8px 16px;">Restart</button>
            </div>
        </div>
    </div>

    <script>
        // Small SVG sprites in data-URI form (keeps repository light).
        const playerSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'>
                <rect x='6' y='8' width='28' height='24' rx='4' ry='4' fill='%23007acc' />
                <circle cx='18' cy='18' r='3' fill='%23fff' />
            </svg>`);

        const bombSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 28 28'>
                <circle cx='14' cy='14' r='10' fill='%23000' />
                <rect x='18' y='2' width='4' height='8' fill='%23b33' rx='1' ry='1' />
            </svg>`);

        const brickSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'>
                <rect x='2' y='6' width='36' height='28' fill='%238b4513' rx='3' ry='3' />
            </svg>`);

        const wallSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'>
                <rect x='2' y='6' width='36' height='28' fill='%23333' rx='2' ry='2' />
            </svg>`);

        const enemySVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 36 36'>
                <rect x='4' y='6' width='28' height='22' fill='%23c03030' rx='4' ry='4' />
                <circle cx='12' cy='14' r='2' fill='%23fff' />
            </svg>`);

        // Create Image objects for game to use if desired
        const playerImage = new Image(); playerImage.src = playerSVG;
        const bombImage = new Image(); bombImage.src = bombSVG;
        const brickImage = new Image(); brickImage.src = 'src/examples/bomberman/assets/Bricks.png';
        // Prefer the Wall.png asset for indestructible walls (fallback SVG still available in wallSVG)
        const wallImage = new Image(); wallImage.src = 'src/examples/bomberman/assets/Wall.png';
        const enemyImage = new Image(); enemyImage.src = enemySVG;
        
        // Powerup images (16x16) used by the example game
        const bombPowerupImg = new Image(); bombPowerupImg.src = 'src/examples/bomberman/assets/bombPowerup.png';
        const shieldPowerupImg = new Image(); shieldPowerupImg.src = 'src/examples/bomberman/assets/shieldPowerup.png';
        // Explosion images (16x16)
        const centerFireImg = new Image(); centerFireImg.src = 'src/examples/bomberman/assets/CenterFire.png';
        const middleFireImg = new Image(); middleFireImg.src = 'src/examples/bomberman/assets/MiddleFire.png';
        const endFireImg = new Image(); endFireImg.src = 'src/examples/bomberman/assets/EndFire.png';
        // Load player sprite sheets (multiple color choices)
        const playerColors = ['blue','brown','green','pink','purple','yellow'];
        const playerSheets = {};
        playerColors.forEach(col => {
            const img = new Image();
            img.src = `src/examples/bomberman/assets/${col}Player.png`;
            playerSheets[col] = img;
        });

        // UI icons for header (16x16) - map player color -> UI image
        const uiImages = {
            blue: (() => { const i=new Image(); i.src='src/examples/bomberman/assets/UIWhite.png'; return i; })(),
            brown: (() => { const i=new Image(); i.src='src/examples/bomberman/assets/UIBrown.png'; return i; })(),
            green: (() => { const i=new Image(); i.src='src/examples/bomberman/assets/UIGreen.png'; return i; })(),
            pink: (() => { const i=new Image(); i.src='src/examples/bomberman/assets/UIPink.png'; return i; })(),
            purple: (() => { const i=new Image(); i.src='src/examples/bomberman/assets/UIPurple.png'; return i; })(),
            yellow: (() => { const i=new Image(); i.src='src/examples/bomberman/assets/UIYellow.png'; return i; })(),
        };
        const uiBombImg = new Image(); uiBombImg.src = 'src/examples/bomberman/assets/UIBomb.png';
        const uiShieldActiveImg = new Image(); uiShieldActiveImg.src = 'src/examples/bomberman/assets/UIShieldActive.png';
        const uiShieldInactiveImg = new Image(); uiShieldInactiveImg.src = 'src/examples/bomberman/assets/UIShieldInactive.png';

        // Helper: create a thumbnail from the first 64x64 frame of a spritesheet
        function createThumbFromSheet(img, size=48) {
            if (!img) return '';
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            try {
                // disable smoothing when scaling down to keep pixels crisp
                if (typeof ctx.imageSmoothingEnabled !== 'undefined') ctx.imageSmoothingEnabled = false;
                if (typeof ctx.mozImageSmoothingEnabled !== 'undefined') ctx.mozImageSmoothingEnabled = false;
                if (typeof ctx.webkitImageSmoothingEnabled !== 'undefined') ctx.webkitImageSmoothingEnabled = false;
                try { ctx.imageSmoothingQuality = 'low'; } catch (e) {}
                // draw only the first 64x64 section (top-left)
                ctx.drawImage(img, 0, 0, 64, 64, 0, 0, size, size);
                return canvas.toDataURL();
            } catch (e) {
                return '';
            }
        }

        function setThumb(imgElement, sheetImg) {
            if (!imgElement) return;
            if (sheetImg && sheetImg.complete) {
                const data = createThumbFromSheet(sheetImg, Math.max(32, Math.min(64, imgElement.width || 48)));
                if (data) imgElement.src = data;
            } else if (sheetImg) {
                sheetImg.onload = () => {
                    const data = createThumbFromSheet(sheetImg, Math.max(32, Math.min(64, imgElement.width || 48)));
                    if (data) imgElement.src = data;
                };
            }
        }

        // Create previews mapping (optional)
        const playerSpritePreview = {
            p1: playerSheets.blue,
            p2: playerSheets.purple
        };

        // bomb sprite sheet (4 frames 16x16)
        const bombSprites = new Image(); bombSprites.src = "src/examples/bomberman/assets/bombSprites2.png";

        // Simple synthesized sounds via WebAudio for place bomb and explosion and death
        let audioCtx = null;
        let audioMasterGain = null;

        function ensureAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function ensureMasterGain() {
            ensureAudio();
            if (!audioMasterGain) {
                audioMasterGain = audioCtx.createGain();
                // initialize master gain to current game volume if available
                const vol = (typeof window.GameVolume !== 'undefined') ? Number(window.GameVolume) : 1.0;
                audioMasterGain.gain.setValueAtTime(isFinite(vol) ? Math.max(0, vol) : 1.0, audioCtx.currentTime);
                audioMasterGain.connect(audioCtx.destination);
            }
        }

        function playPlaceBomb() {
            ensureAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(440, audioCtx.currentTime);
            // sanitize volume and route through master gain
            let vol = Number(window.GameVolume);
            if (!isFinite(vol) || vol < 0) vol = 1.0;
            vol = Math.max(0.0, vol);
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            // use finite positive target for exponential ramp
            g.gain.exponentialRampToValueAtTime(0.09 * Math.max(0.0001, vol), audioCtx.currentTime + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
            o.connect(g);
            ensureMasterGain();
            g.connect(audioMasterGain);
            o.start(); o.stop(audioCtx.currentTime + 0.22);
        }

        function playExplosion() {
            ensureAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(120, audioCtx.currentTime);
            // sanitize volume and route through master gain
            let vol = Number(window.GameVolume);
            if (!isFinite(vol) || vol < 0) vol = 1.0;
            vol = Math.max(0.0, vol);
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.3 * Math.max(0.0001, vol), audioCtx.currentTime + 0.01);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
            o.connect(g);
            ensureMasterGain();
            g.connect(audioMasterGain);
            o.start(); o.stop(audioCtx.currentTime + 0.6);
        }

        function playDeath() {
            ensureAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square';
            o.frequency.setValueAtTime(200, audioCtx.currentTime);
            // sanitize volume and route through master gain
            let vol = Number(window.GameVolume);
            if (!isFinite(vol) || vol < 0) vol = 1.0;
            vol = Math.max(0.0, vol);
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.2 * Math.max(0.0001, vol), audioCtx.currentTime + 0.01);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.7);
            o.connect(g);
            ensureMasterGain();
            g.connect(audioMasterGain);
            o.start(); o.stop(audioCtx.currentTime + 0.7);
        }

        // keep master gain in sync with the UI slider
        (function wireVolumeSlider() {
            const slider = document.getElementById('volumeSlider');
            if (!slider) return;
            // ensure existing handlers still run; we add syncing for master gain
            slider.addEventListener('input', (ev) => {
                const v = Number(ev.target.value);
                if (!isFinite(v)) return;
                window.GameVolume = v;
                if (audioMasterGain && audioCtx) {
                    try { audioMasterGain.gain.setValueAtTime(Math.max(0, v), audioCtx.currentTime); } catch (e) { /* ignore */ }
                }
            });
        })();

        // Expose assets globally so src/examples/bomberman/bomberman.js can use them if it checks window.BombermanAssets
        window.BombermanAssets = {
            playerSheets, // map of color -> Image
            playerSpritePreview,
            playerSpriteP1: playerSheets.blue,
            playerSpriteP2: playerSheets.purple,
            playerImage, bombImage, brickImage, wallImage, enemyImage, bombSprites,
            // expose powerup images
            bombPowerup: bombPowerupImg,
            shieldPowerup: shieldPowerupImg,
            // explosion images
            centerFire: centerFireImg,
            middleFire: middleFireImg,
            endFire: endFireImg
        };

        // expose UI icons as well
        window.BombermanAssets.uiImages = uiImages;
        window.BombermanAssets.uiBomb = uiBombImg;
        window.BombermanAssets.uiShieldActive = uiShieldActiveImg;
        window.BombermanAssets.uiShieldInactive = uiShieldInactiveImg;

        // attach audio helper functions after the object exists (avoids ReferenceError if functions weren't parsed yet)
        window.BombermanAssets.playPlaceBomb = playPlaceBomb;
        window.BombermanAssets.playExplosion = playExplosion;
        window.BombermanAssets.playDeath = playDeath;

        function showMainMenu() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('pauseOverlay').style.display = 'none';
            // pause the game loop
            window.GamePaused = true;
            // start the animated intro for the main menu
            try { startMainMenuIntro(); } catch (e) { /* ignore if function missing */ }
        }

        function hideMainMenu() {
            document.getElementById('mainMenu').style.display = 'none';
            // allow the game to run
            window.GamePaused = false;
        }

        function startGameFromMenu() {
            hideMainMenu();
            // initialize the example game
            Init(BombermanGame);
        }

        function togglePause() {
            const overlay = document.getElementById('pauseOverlay');
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
                window.GamePaused = false;
            } else {
                overlay.style.display = 'flex';
                window.GamePaused = true;
            }
        }

        // when starting the game apply selected player sheets
        function ApplyPlayerSelections() {
            const p1Thumb = document.getElementById('p1Thumb');
            const p2Thumb = document.getElementById('p2Thumb');
            const p1 = (p1Thumb && p1Thumb.dataset && p1Thumb.dataset.color) ? p1Thumb.dataset.color : 'blue';
            const p2 = (p2Thumb && p2Thumb.dataset && p2Thumb.dataset.color) ? p2Thumb.dataset.color : 'purple';
            if (window.BombermanAssets && window.BombermanAssets.playerSheets) {
                window.BombermanAssets.playerSpriteP1 = window.BombermanAssets.playerSheets[p1] || window.BombermanAssets.playerSpriteP1;
                window.BombermanAssets.playerSpriteP2 = window.BombermanAssets.playerSheets[p2] || window.BombermanAssets.playerSpriteP2;
                // remember selected colors for HUD UI icons
                window.BombermanAssets.playerColorP1 = p1;
                window.BombermanAssets.playerColorP2 = p2;
            }
        }

        // Hook into existing start handlers to apply selection before Init
        const originalMenuPlay = window.menuPlayBtnClick;

        // Start the page
        window.onload = () => {
            // setup thumbnail selectors for players
            const p1Thumb = document.getElementById('p1Thumb');
            const p2Thumb = document.getElementById('p2Thumb');
            if (p1Thumb) {
                // default to blue
                p1Thumb.dataset.colorIndex = 0;
                p1Thumb.dataset.color = playerColors[0];
                setThumb(p1Thumb, playerSheets[playerColors[0]]);
                p1Thumb.addEventListener('click', () => {
                    let idx = (parseInt(p1Thumb.dataset.colorIndex || 0, 10) + 1) % playerColors.length;
                    p1Thumb.dataset.colorIndex = idx;
                    const col = playerColors[idx];
                    p1Thumb.dataset.color = col;
                    setThumb(p1Thumb, playerSheets[col]);
                });
            }
            if (p2Thumb) {
                // default to purple
                const defaultIdx = playerColors.indexOf('purple') >= 0 ? playerColors.indexOf('purple') : 4;
                p2Thumb.dataset.colorIndex = defaultIdx;
                p2Thumb.dataset.color = playerColors[defaultIdx];
                setThumb(p2Thumb, playerSheets[playerColors[defaultIdx]]);
                p2Thumb.addEventListener('click', () => {
                    let idx = (parseInt(p2Thumb.dataset.colorIndex || 0, 10) + 1) % playerColors.length;
                    p2Thumb.dataset.colorIndex = idx;
                    const col = playerColors[idx];
                    p2Thumb.dataset.color = col;
                    setThumb(p2Thumb, playerSheets[col]);
                });
            }
            // Optional legacy Start button (keeps old behaviour as restart) - guard in case element missing
            const startBtn = document.getElementById('startBtn');
            if (startBtn) {
                startBtn.addEventListener('click', () => {
                    ApplyPlayerSelections();
                    Init(BombermanGame);
                    document.getElementById('mainMenu').style.display = 'none';
                    window.GamePaused = false;
                });
            }

            // Main menu Play button
            document.getElementById('menuPlayBtn').addEventListener('click', () => { ApplyPlayerSelections(); startGameFromMenu(); });

            // Pause overlay buttons
            document.getElementById('resumeBtn').addEventListener('click', () => togglePause());
            document.getElementById('menuBtn').addEventListener('click', () => {
                // show main menu and stop current game
                showMainMenu();
            });

            // Volume slider
            const vol = document.getElementById('volumeSlider');
            function updateVolumeSliderAppearance(slider) {
                if (!slider) return;
                const red = 'rgb(233,62,0)';
                const val = Number(slider.value || 0);
                const pct = Math.max(0, Math.min(100, val));
                const grad = `linear-gradient(to right, ${red} 0%, ${red} ${pct}%, #ddd ${pct}%, #ddd 100%)`;
                // apply to inline background (works in WebKit/Blink) and set CSS var for pseudo-elements
                slider.style.background = grad;
                slider.style.setProperty('--range-bg', grad);
                // Firefox uses ::-moz-range-progress; set that via a CSS var fallback handled above
            }
            if (vol) {
                // initialize appearance and set volume
                updateVolumeSliderAppearance(vol);
                window.GameVolume = Number(vol.value) / 100.0;
                vol.addEventListener('input', (e) => {
                    const v = Number(e.target.value);
                    window.GameVolume = isFinite(v) ? v / 100.0 : 1.0;
                    updateVolumeSliderAppearance(vol);
                });
            }

            // Clicking canvas focuses input
            const c = document.getElementById('myCanvas');
            c.addEventListener('mousedown', () => c.focus());

            // Show main menu on load
            showMainMenu();

            // Toggle pause with Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' || e.keyCode === 27) {
                    // only toggle if a game is initialized
                    if (typeof Init === 'function') {
                        togglePause();
                    }
                }
            });
                // ensure overlays are positioned over the game area (header + canvas)
                function positionOverlays() {
                    const container = document.getElementById('gameContainer');
                    if (!container) return;
                    const rect = container.getBoundingClientRect();
                    ['mainMenu','pauseOverlay','gameOverOverlay'].forEach(id => {
                        const el = document.getElementById(id);
                        if (!el) return;
                        el.style.position = 'absolute';
                        el.style.left = rect.left + 'px';
                        el.style.top = rect.top + 'px';
                        el.style.width = rect.width + 'px';
                        el.style.height = rect.height + 'px';
                        el.style.margin = '0';
                    });
                    // scale the main menu and game-over panels so they occupy the full header+canvas area
                    ['mainMenuPanel','gameOverPanel'].forEach(pid => {
                        const panel = document.getElementById(pid);
                        if (!panel) return;
                        const baseW = 600, baseH = 600; // header(80)+canvas(520) = 600
                        const scale = Math.min(rect.width / baseW, rect.height / baseH);
                        panel.style.transform = `scale(${scale})`;
                        // center the scaled panel inside the overlay
                        panel.style.margin = '0 auto';
                    });
                }
                // initial placement and update on resize/scroll
                positionOverlays();
                window.addEventListener('resize', positionOverlays);
                window.addEventListener('scroll', positionOverlays);
        };

        // Show game over overlay with winner id (1 or 2)
        function ShowGameOver(winner) {
            const overlay = document.getElementById('gameOverOverlay');
            const msg = document.getElementById('gameOverMessage');
            const title = document.getElementById('gameOverTitle');
            title.textContent = 'Game Over';
            msg.textContent = winner === 1 ? 'Player 1 Wins' : 'Player 2 Wins';
            overlay.style.display = 'flex';
            // pause game loop
            window.GamePaused = true;
        }

        function HideGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            overlay.style.display = 'none';
            window.GamePaused = false;
        }

        // --- Main Menu Intro Animation -------------------------------------------------
        (function(){
            let introPlaying = false;
            let introPlayedOnce = false;

            function drawBombFrame(ctx, img, frame, x, y, size) {
                if (!img || !img.complete) return;
                const fw = img.width / 4 || 16;
                const fh = img.height || fw;
                ctx.drawImage(img, frame * fw, 0, fw, fh, x - size/2, y - size/2, size, size);
            }

            function startMainMenuIntro() {
                const panel = document.getElementById('mainMenuPanel');
                if (!panel) return;
                // if we've already played once, just reveal everything
                if (introPlayedOnce) {
                    const title = document.getElementById('menuTitle');
                    const subtitle = document.getElementById('menuSubtitle');
                    const content = document.getElementById('menuContent');
                    if (title) title.style.opacity = 1;
                    if (subtitle) subtitle.style.opacity = 1;
                    if (content) { content.style.opacity = 1; content.style.transform = 'translateY(0)'; }
                    return;
                }
                if (introPlaying) return;
                introPlaying = true;

                const canvas = document.getElementById('menuAnimCanvas');
                if (!canvas) { introPlaying=false; introPlayedOnce=true; return; }
                const ctx = canvas.getContext('2d');
                const bombImg = window.BombermanAssets && window.BombermanAssets.bombSprites ? window.BombermanAssets.bombSprites : bombSprites;
                const centerFire = window.BombermanAssets && window.BombermanAssets.centerFire ? window.BombermanAssets.centerFire : centerFireImg;
                const middleFire = window.BombermanAssets && window.BombermanAssets.middleFire ? window.BombermanAssets.middleFire : middleFireImg;
                const endFire = window.BombermanAssets && window.BombermanAssets.endFire ? window.BombermanAssets.endFire : endFireImg;

                const baseW = 600, baseH = 600;
                // target where the title is roughly positioned (panel center Y offset)
                const centerX = baseW/2;
                const titleY = 160; // landing Y

                const bombSize = 64;
                // slower timings for more dramatic effect
                const dropDuration = 1200; // ms
                const explodeDelay = 300; // ms after landing
                const fireDuration = 1200; // ms

                // doubled fire tile size and precompute positions so tiles sit flush
                const fireTile = 32; // draw middleFire at 32x32 for pixel-perfect seams

                let start = null;
                let exploded = false;
                let fireStart = null;

                // prepare left/right fire centers so tiles touch with no center tile
                const maxPieces = 4; // pieces each side
                const firePositions = [];
                for (let i = 1; i <= maxPieces; i++) {
                    // left centers: centerX - (fireTile/2) - (i-1)*fireTile
                    firePositions.push({ x: centerX - (fireTile/2) - (i-1)*fireTile, y: titleY });
                }
                for (let i = 1; i <= maxPieces; i++) {
                    // right centers: centerX + (fireTile/2) + (i-1)*fireTile
                    firePositions.push({ x: centerX + (fireTile/2) + (i-1)*fireTile, y: titleY });
                }

                // ensure pixelated drawing
                try {
                    ctx.imageSmoothingEnabled = false;
                    ctx.mozImageSmoothingEnabled = false;
                    ctx.webkitImageSmoothingEnabled = false;
                    ctx.msImageSmoothingEnabled = false;
                } catch (e) {}

                function frame(ts) {
                    if (!start) start = ts;
                    const elapsed = ts - start;
                    // clear (transparent to show orange panel underneath)
                    ctx.clearRect(0,0,baseW,baseH);

                    if (elapsed < dropDuration) {
                        // falling bomb: ease-out from startY to titleY
                        const t = elapsed / dropDuration;
                        const ease = 1 - Math.pow(1 - t, 3);
                        const startY = -120;
                        const y = startY + (titleY - startY) * ease;
                        // animate bomb frame (slower) based on time
                        const frameDt = 300; // ms per frame
                        const animFrame = Math.floor((elapsed / frameDt) % 4);
                        // draw bomb with pixel-perfect scaling
                        ctx.save();
                        try { ctx.imageSmoothingEnabled = false; } catch (e) {}
                        drawBombFrame(ctx, bombImg, animFrame, centerX, y, bombSize);
                        ctx.restore();
                    } else if (!exploded) {
                        // landed: draw final bomb frame and schedule explosion
                        ctx.save(); try { ctx.imageSmoothingEnabled = false; } catch (e) {}
                        drawBombFrame(ctx, bombImg, 0, centerX, titleY, bombSize);
                        ctx.restore();
                        if (elapsed >= dropDuration + explodeDelay) {
                            exploded = true;
                            fireStart = ts;
                            // play explosion sound
                            try { if (window.BombermanAssets && window.BombermanAssets.playExplosion) window.BombermanAssets.playExplosion(); } catch (e) {}
                        }
                    } else {
                        // explosion phase: spread left/right using only middle/end images (no center)
                        const fe = ts - fireStart;
                        const alpha = Math.max(0, 1 - (fe / fireDuration));
                        ctx.globalAlpha = alpha;
                        for (let i=0;i<firePositions.length;i++) {
                            const pos = firePositions[i];
                            // choose end sprite for outermost pieces, middle for inner
                            let img = middleFire;
                            if (i === 0 || i === firePositions.length - 1) img = endFire;
                            if (img && img.complete) {
                                ctx.save();
                                try { ctx.imageSmoothingEnabled = false; } catch (e) {}
                                ctx.drawImage(img, pos.x - fireTile/2, pos.y - fireTile/2, fireTile, fireTile);
                                ctx.restore();
                            }
                        }
                        ctx.globalAlpha = 1;
                        if (fe >= fireDuration) {
                            // end of intro
                            ctx.clearRect(0,0,baseW,baseH);
                            revealMenuTextAndContent();
                            introPlaying = false;
                            introPlayedOnce = true;
                            return;
                        }
                    }
                    requestAnimationFrame(frame);
                }

                function revealMenuTextAndContent() {
                    const title = document.getElementById('menuTitle');
                    const subtitle = document.getElementById('menuSubtitle');
                    const content = document.getElementById('menuContent');
                    if (title) title.style.opacity = 1;
                    // subtitle fades in slightly after (CSS transition delay already applied)
                    if (subtitle) subtitle.style.opacity = 1;
                    // slide content up
                    setTimeout(() => {
                        if (content) { content.style.opacity = 1; content.style.transform = 'translateY(0)'; }
                    }, 220);
                }

                // begin the animation loop
                requestAnimationFrame(frame);
            }

            // expose function globally so showMainMenu can call it
            window.startMainMenuIntro = startMainMenuIntro;
        })();

        // Hook overlay buttons
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.getElementById('gameOverMenuBtn');
            const restartBtn = document.getElementById('gameOverRestartBtn');
            if (menuBtn) menuBtn.addEventListener('click', () => {
                HideGameOver();
                // show main menu overlay
                showMainMenu();
            });
            if (restartBtn) restartBtn.addEventListener('click', () => {
                HideGameOver();
                // restart the game
                ApplyPlayerSelections();
                Init(BombermanGame);
                document.getElementById('mainMenu').style.display = 'none';
                window.GamePaused = false;
            });
        });
    </script>
</body>
</html>
