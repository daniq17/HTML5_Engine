<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Engine - Bomberman Clone</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="src/examples/bomberman/bomberman.css">

    <!-- Engine core -->
    <script src="src/engine/renderer.js"></script>
    <script src="src/engine/main.js"></script>
    <script src="src/engine/utils_math.js"></script>
    <script src="src/engine/input.js"></script>
    <script src="src/engine/audioplayer.js"></script>
    <script src="src/engine/game.js"></script>
    <script src="src/engine/utils_classes.js"></script>
    <script src="src/engine/gameobjects.js"></script>

    <!-- Example game -->
    <script src="src/examples/bomberman/bomberman.js"></script>

</head>
<body>
    <div id="gameContainer">
        <div id="gameHeader">
            <div id="gameState"></div>
            <div id="gamePlayers"></div>
        </div>

        <canvas id="myCanvas" width="600" height="520" tabindex="0"></canvas>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" style="position:absolute; inset:0; display:flex;">
        <div id="mainMenuPanel">
            <!-- animation canvas overlays the panel and runs the intro sequence -->
            <canvas id="menuAnimCanvas" width="600" height="600"></canvas>

            <!-- Title & subtitle: hidden initially, revealed after the intro animation -->
            <div id="menuTitles">
                <h1 id="menuTitle">BomberKids</h1>
                <p id="menuSubtitle">Who Gave Them Bombs?</p>
            </div>

            <!-- Main content hidden initially; slides up when shown -->
            <div id="menuContent">
                <div class="thumb-row">
                    <div class="thumb-wrap">
                        <div>Player 1</div>
                        <img id="p1Thumb" src="" alt="P1" title="Click to cycle colors" />
                    </div>
                    <div class="thumb-wrap">
                        <div>Player 2</div>
                        <img id="p2Thumb" src="" alt="P2" title="Click to cycle colors" />
                    </div>
                </div>
                <div style="margin-bottom:12px;">
                    <button id="menuPlayBtn">Play</button>
                </div>
                <div style="font-size:12px; color:#000000;">Choose each player's color before starting.</div>
            </div>
        </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" style="position:absolute; inset:0; display:none;">
        <div>
            <h2>Paused</h2>
            <label>Volume</label>
            <input id="volumeSlider" type="range" min="0" max="100" value="100" />
            <div style="display:flex; gap:8px; justify-content:center;">
                <button id="resumeBtn">Resume</button>
                <button id="menuBtn">Menu</button>
            </div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOverOverlay" style="position:absolute; inset:0; display:none; z-index: 1001;">
        <div id="gameOverPanel">
            <h2 id="gameOverTitle">Game Over</h2>
            <p id="gameOverMessage">Player 1 Wins</p>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button id="gameOverMenuBtn">Menu</button>
                <button id="gameOverRestartBtn">Restart</button>
            </div>
        </div>
    </div>
