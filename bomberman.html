<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Engine - Bomberman Clone</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="src/examples/bomberman/bomberman.css">

        <!-- ===== Engine core scripts =====
            These load the minimal engine runtime required by the example:
            - renderer: canvas drawing helpers
            - main: engine bootstrap / game loop
            - utils_math/input/audioplayer: shared utilities used by games
            - game / utils_classes / gameobjects: core engine abstractions
        -->
    <script src="src/engine/renderer.js"></script>
    <script src="src/engine/main.js"></script>
    <script src="src/engine/utils_math.js"></script>
    <script src="src/engine/input.js"></script>
    <script src="src/engine/audioplayer.js"></script>
    <script src="src/engine/game.js"></script>
    <script src="src/engine/utils_classes.js"></script>
    <script src="src/engine/gameobjects.js"></script>

        <!-- ===== Example game (Bomberman) =====
            Loads the example implementation which also exposes page helpers
            (window.BombermanAssets, window.BombermanPage, and BombermanGame).
        -->
    <script src="src/examples/bomberman/bomberman.js"></script>

</head>
<body>
        <!-- ===== Game container =====
            Contains the header HUD and the main canvas where the game renders.
        -->
        <div id="gameContainer">
        <div id="gameHeader">
            <div id="gameState" style="display:flex; gap:12px; align-items:center;">
                <div id="player1Hud" style="display:flex; align-items:center; gap:6px;">
                    <img id="p1_ui_img" src="" style="width:40px;height:40px;object-fit:contain;border-radius:6px;" alt="P1"/>
                    <div id="p1_lives" style="font-size:24px; font-weight:600; background:#000; border:3px solid rgb(233,62,0); padding:6px; color:#fff; border-radius:4px; min-width:20px; text-align:center;">3</div>
                    <img id="p1_bomb_img" src="" style="width:40px;height:40px;object-fit:contain;" alt="Bomb"/>
                    <div id="p1_bomb_count" style="font-size:24px; background:#000; border:3px solid rgb(233,62,0); padding:6px; color:#fff; border-radius:4px; min-width:20px; text-align:center;">1</div>
                    <img id="p1_shield_img" src="" style="width:40px;height:40px;object-fit:contain;" alt="Shield"/>
                </div>
            </div>
            <div id="gamePlayers" style="display:flex; gap:12px; align-items:center; justify-content:flex-end;">
                <div id="player2Hud" style="display:flex; align-items:center; gap:6px;">
                    <img id="p2_ui_img" src="" style="width:40px;height:40px;object-fit:contain;border-radius:6px;" alt="P2"/>
                    <div id="p2_lives" style="font-size:24px; font-weight:600; background:#000; border:3px solid rgb(233,62,0); padding:6px; color:#fff; border-radius:4px; min-width:20px; text-align:center;">3</div>
                    <img id="p2_bomb_img" src="" style="width:40px;height:40px;object-fit:contain;" alt="Bomb"/>
                    <div id="p2_bomb_count" style="font-size:24px; background:#000; border:3px solid rgb(233,62,0); padding:6px; color:#fff; border-radius:4px; min-width:20px; text-align:center;">1</div>
                    <img id="p2_shield_img" src="" style="width:40px;height:40px;object-fit:contain;" alt="Shield"/>
                </div>
            </div>
        </div>

        <canvas id="myCanvas" width="600" height="520" tabindex="0"></canvas>
    </div>

        <!-- ===== Main Menu Overlay =====
            Visible on load. The content is rendered by static DOM; the
            interaction wiring lives in bomberman.js (BombermanPage.Init).
        -->
    <div id="mainMenu" style="position:absolute; inset:0; display:flex;">
        <div id="mainMenuPanel">
            <!-- animation canvas overlays the panel and runs the intro sequence -->
            <canvas id="menuAnimCanvas" width="600" height="600"></canvas>

            <!-- Title & subtitle: hidden initially, revealed after the intro animation -->
            <div id="menuTitles">
                <h1 id="menuTitle">BomberKids</h1>
                <p id="menuSubtitle">Who Gave Them Bombs?</p>
            </div>

            <!-- Main content hidden initially; slides up when shown -->
            <div id="menuContent">
                <div class="thumb-row">
                    <div class="thumb-wrap">
                        <div>Player 1</div>
                        <img id="p1Thumb" src="" alt="P1" title="Click to cycle colors" />
                    </div>
                    <div class="thumb-wrap">
                        <div>Player 2</div>
                        <img id="p2Thumb" src="" alt="P2" title="Click to cycle colors" />
                    </div>
                </div>
                <div style="margin-bottom:12px;">
                    <button id="menuPlayBtn">Play</button>
                </div>
                <div style="font-size:12px; color:#000000;">Choose each player's color before starting.</div>
            </div>
        </div>
    </div>

        <!-- ===== Pause Overlay =====
            Shown when the game is paused. Volume slider is wired by
            BombermanPage.Init in bomberman.js so the slider affects audio.
        -->
    <div id="pauseOverlay" style="position:absolute; inset:0; display:none;">
        <div>
            <h2>Paused</h2>
            <label>Volume</label>
            <input id="volumeSlider" type="range" min="0" max="100" value="100" />
            <div style="display:flex; gap:8px; justify-content:center;">
                <button id="resumeBtn">Resume</button>
                <button id="menuBtn">Menu</button>
            </div>
        </div>
    </div>

        <!-- ===== Game Over Overlay =====
            Shown at the end of a match. Controls (Menu / Restart) are
            wired in bomberman.js so game lifecycle is handled centrally.
        -->
    <div id="gameOverOverlay" style="position:absolute; inset:0; display:none; z-index: 1001;">
        <div id="gameOverPanel">
            <h2 id="gameOverTitle">Game Over</h2>
            <p id="gameOverMessage">Player 1 Wins</p>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button id="gameOverMenuBtn">Menu</button>
                <button id="gameOverRestartBtn">Restart</button>
            </div>
        </div>
    </div>



    
    <script>
        // Bridge functions: delegate page-level calls to the JS module
        // (BombermanPage lives in src/examples/bomberman/bomberman.js).
        // Keeping these small wrappers preserves the original API used by
        // other inline code while moving implementation into the JS file.
        function showMainMenu() { try { if (window.BombermanPage && typeof window.BombermanPage.showMainMenu === 'function') window.BombermanPage.showMainMenu(); } catch(e){} }
        function hideMainMenu() { try { if (window.BombermanPage && typeof window.BombermanPage.hideMainMenu === 'function') window.BombermanPage.hideMainMenu(); } catch(e){} }
        function startGameFromMenu() { try { if (window.BombermanPage && typeof window.BombermanPage.startGameFromMenu === 'function') window.BombermanPage.startGameFromMenu(); } catch(e){} }
        function togglePause() { try { if (window.BombermanPage && typeof window.BombermanPage.togglePause === 'function') window.BombermanPage.togglePause(); } catch(e){} }
        function ShowGameOver(winner) { try { if (window.BombermanPage && typeof window.BombermanPage.showGameOver === 'function') window.BombermanPage.showGameOver(winner); } catch(e){} }
        function HideGameOver() { try { if (window.BombermanPage && typeof window.BombermanPage.hideGameOver === 'function') window.BombermanPage.hideGameOver(); } catch(e){} }

        // when starting the game apply selected player sheets
        function ApplyPlayerSelections() { try { if (window.BombermanPage && typeof window.BombermanPage.ApplyPlayerSelections === 'function') window.BombermanPage.ApplyPlayerSelections(); } catch(e){} }

        // Initialize page UI once the window is ready. This calls into
        // the BombermanPage module which sets up event handlers and layout.
        window.onload = () => { try { if (window.BombermanPage && typeof window.BombermanPage.Init === 'function') window.BombermanPage.Init(); } catch(e){} };


        // --- Main Menu Intro Animation -------------------------------------------------
        (function(){
            let introPlaying = false;
            let introPlayedOnce = false;

            function drawBombFrame(ctx, img, frame, x, y, size) {
                if (!img || !img.complete) return;
                const fw = img.width / 4 || 16;
                const fh = img.height || fw;
                ctx.drawImage(img, frame * fw, 0, fw, fh, x - size/2, y - size/2, size, size);
            }

            function startMainMenuIntro() {
                const panel = document.getElementById('mainMenuPanel');
                if (!panel) return;
                // if we've already played once, just reveal everything
                if (introPlayedOnce) {
                    const title = document.getElementById('menuTitle');
                    const subtitle = document.getElementById('menuSubtitle');
                    const content = document.getElementById('menuContent');
                    if (title) title.style.opacity = 1;
                    if (subtitle) subtitle.style.opacity = 1;
                    if (content) { content.style.opacity = 1; content.style.transform = 'translateY(0)'; }
                    return;
                }
                if (introPlaying) return;
                introPlaying = true;

                const canvas = document.getElementById('menuAnimCanvas');
                if (!canvas) { introPlaying=false; introPlayedOnce=true; return; }
                const ctx = canvas.getContext('2d');
                const bombImg = window.BombermanAssets && window.BombermanAssets.bombSprites ? window.BombermanAssets.bombSprites : bombSprites;
                const centerFire = window.BombermanAssets && window.BombermanAssets.centerFire ? window.BombermanAssets.centerFire : centerFireImg;
                const middleFire = window.BombermanAssets && window.BombermanAssets.middleFire ? window.BombermanAssets.middleFire : middleFireImg;
                const endFire = window.BombermanAssets && window.BombermanAssets.endFire ? window.BombermanAssets.endFire : endFireImg;

                const baseW = 600, baseH = 600;
                // target where the title is roughly positioned (panel center Y offset)
                const centerX = baseW/2;
                const titleY = 160; // landing Y

                const bombSize = 64;
                // slower timings for more dramatic effect
                const dropDuration = 1200; // ms
                const explodeDelay = 300; // ms after landing
                const fireDuration = 1200; // ms

                // doubled fire tile size and precompute positions so tiles sit flush
                const fireTile = 32; // draw middleFire at 32x32 for pixel-perfect seams

                let start = null;
                let exploded = false;
                let fireStart = null;

                // prepare left/right fire centers so tiles touch with no center tile
                const maxPieces = 4; // pieces each side
                const firePositions = [];
                for (let i = 1; i <= maxPieces; i++) {
                    // left centers: centerX - (fireTile/2) - (i-1)*fireTile
                    firePositions.push({ x: centerX - (fireTile/2) - (i-1)*fireTile, y: titleY });
                }
                for (let i = 1; i <= maxPieces; i++) {
                    // right centers: centerX + (fireTile/2) + (i-1)*fireTile
                    firePositions.push({ x: centerX + (fireTile/2) + (i-1)*fireTile, y: titleY });
                }

                // ensure pixelated drawing
                try {
                    ctx.imageSmoothingEnabled = false;
                    ctx.mozImageSmoothingEnabled = false;
                    ctx.webkitImageSmoothingEnabled = false;
                    ctx.msImageSmoothingEnabled = false;
                } catch (e) {}

                function frame(ts) {
                    if (!start) start = ts;
                    const elapsed = ts - start;
                    // clear (transparent to show orange panel underneath)
                    ctx.clearRect(0,0,baseW,baseH);

                    if (elapsed < dropDuration) {
                        // falling bomb: ease-out from startY to titleY
                        const t = elapsed / dropDuration;
                        const ease = 1 - Math.pow(1 - t, 3);
                        const startY = -120;
                        const y = startY + (titleY - startY) * ease;
                        // animate bomb frame (slower) based on time
                        const frameDt = 300; // ms per frame
                        const animFrame = Math.floor((elapsed / frameDt) % 4);
                        // draw bomb with pixel-perfect scaling
                        ctx.save();
                        try { ctx.imageSmoothingEnabled = false; } catch (e) {}
                        drawBombFrame(ctx, bombImg, animFrame, centerX, y, bombSize);
                        ctx.restore();
                    } else if (!exploded) {
                        // landed: draw final bomb frame and schedule explosion
                        ctx.save(); try { ctx.imageSmoothingEnabled = false; } catch (e) {}
                        drawBombFrame(ctx, bombImg, 0, centerX, titleY, bombSize);
                        ctx.restore();
                        if (elapsed >= dropDuration + explodeDelay) {
                            exploded = true;
                            fireStart = ts;
                            // play explosion sound
                            try { if (window.BombermanAssets && window.BombermanAssets.playExplosion) window.BombermanAssets.playExplosion(); } catch (e) {}
                        }
                    } else {
                        // explosion phase: spread left/right using only middle/end images (no center)
                        const fe = ts - fireStart;
                        const alpha = Math.max(0, 1 - (fe / fireDuration));
                        ctx.globalAlpha = alpha;
                        for (let i=0;i<firePositions.length;i++) {
                            const pos = firePositions[i];
                            // choose end sprite for outermost pieces, middle for inner
                            let img = middleFire;
                            if (i === 0 || i === firePositions.length - 1) img = endFire;
                            if (img && img.complete) {
                                ctx.save();
                                try { ctx.imageSmoothingEnabled = false; } catch (e) {}
                                ctx.drawImage(img, pos.x - fireTile/2, pos.y - fireTile/2, fireTile, fireTile);
                                ctx.restore();
                            }
                        }
                        ctx.globalAlpha = 1;
                        if (fe >= fireDuration) {
                            // end of intro
                            ctx.clearRect(0,0,baseW,baseH);
                            revealMenuTextAndContent();
                            introPlaying = false;
                            introPlayedOnce = true;
                            return;
                        }
                    }
                    requestAnimationFrame(frame);
                }

                function revealMenuTextAndContent() {
                    const title = document.getElementById('menuTitle');
                    const subtitle = document.getElementById('menuSubtitle');
                    const content = document.getElementById('menuContent');
                    if (title) title.style.opacity = 1;
                    // subtitle fades in slightly after (CSS transition delay already applied)
                    if (subtitle) subtitle.style.opacity = 1;
                    // slide content up
                    setTimeout(() => {
                        if (content) { content.style.opacity = 1; content.style.transform = 'translateY(0)'; }
                    }, 220);
                }

                // begin the animation loop
                requestAnimationFrame(frame);
            }

            // expose function globally so showMainMenu can call it
            window.startMainMenuIntro = startMainMenuIntro;
        })();

        // Overlay button hooks moved to BombermanPage.Init()
    </script>
</body>
</html>
