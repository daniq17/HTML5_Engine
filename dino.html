<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Engine - Dino (Chrome T-Rex Clone)</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="css/style.css">

    <!-- Engine core -->
    <script src="src/engine/renderer.js"></script>
    <script src="src/engine/main.js"></script>
    <script src="src/engine/utils_math.js"></script>
    <script src="src/engine/input.js"></script>
    <script src="src/engine/audioplayer.js"></script>
    <script src="src/engine/game.js"></script>
    <script src="src/engine/utils_classes.js"></script>
    <script src="src/engine/gameobjects.js"></script>

    <!-- Example game -->
    <script src="src/examples/dino.js"></script>

    <style>
        body { display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f3f3f3; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
        #notes { position: absolute; bottom: 10px; left: 10px; font-family: Arial, sans-serif; font-size: 13px; color:#333; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="startBtn">Start / Restart</button>
    </div>

    <canvas id="myCanvas" width="800" height="300" style="border:1px solid #888; background: #fff;"></canvas>

    <div id="notes">Space / Up / W = jump</div>

    <script>
        // Small SVG sprites in data-URI form (keeps repository light). The game can use them if available.
        const dinoSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='44' height='44' viewBox='0 0 44 44'>
                <rect rx='6' ry='6' x='2' y='8' width='28' height='22' fill='%23333' />
                <rect x='28' y='18' width='12' height='8' fill='%23333' />
                <circle cx='12' cy='16' r='3' fill='%23fff' />
            </svg>`);

        const cactusSVG = `data:image/svg+xml;utf8,` + encodeURIComponent(`
            <svg xmlns='http://www.w3.org/2000/svg' width='32' height='48' viewBox='0 0 32 48'>
                <rect x='10' y='6' width='12' height='36' rx='4' ry='4' fill='%23060' />
                <rect x='4' y='18' width='6' height='12' rx='3' ry='3' fill='%23060' />
                <rect x='22' y='18' width='6' height='12' rx='3' ry='3' fill='%23060' />
            </svg>`);

        // Create Image objects for game to use if desired
        const dinoImage = new Image(); dinoImage.src = dinoSVG;
        const cactusImage = new Image(); cactusImage.src = cactusSVG;

        // Simple synthesized sounds via WebAudio for jump and crash
        let audioCtx = null;
        function ensureAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playJumpSound() {
            ensureAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(600, audioCtx.currentTime);
            g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + 0.01);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.26);
        }

        function playCrashSound() {
            ensureAudio();
            const o1 = audioCtx.createOscillator();
            const o2 = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o1.type = 'sawtooth'; o2.type = 'square';
            o1.frequency.setValueAtTime(150, audioCtx.currentTime);
            o2.frequency.setValueAtTime(240, audioCtx.currentTime);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.7);
            o1.connect(g); o2.connect(g); g.connect(audioCtx.destination);
            o1.start(); o2.start();
            o1.stop(audioCtx.currentTime + 0.7); o2.stop(audioCtx.currentTime + 0.7);
        }

        // Expose assets globally so src/examples/dino.js can use them if it checks window.DinoAssets
        window.DinoAssets = {
            dinoImage: dinoImage,
            cactusImage: cactusImage,
            playJump: playJumpSound,
            playCrash: playCrashSound
        };

        // Start the game when page loads
        window.onload = () => {
            // Start button
            document.getElementById('startBtn').addEventListener('click', () => {
                Init(DinoGame);
            });

            // Auto-init once so Start() is called; the example's Start method will set up state.
            Init(DinoGame);

            // Clicking canvas focuses input
            const c = document.getElementById('myCanvas');
            c.addEventListener('mousedown', () => c.focus());
        };
    </script>
</body>
</html>
